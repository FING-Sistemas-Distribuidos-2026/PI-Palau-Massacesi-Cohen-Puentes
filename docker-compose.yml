

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: telephone_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-telephone_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-telephone_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telephone_network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: telephone_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telephone_network

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: telephone_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    command: sh -c "ollama serve & sleep 10 && ollama pull qwen2.5:0.5b && wait"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - telephone_network

  # API Service
  api:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.api
    container_name: telephone_api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:devpassword123@postgres:5432/telephone_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672//}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - telephone_network
    restart: unless-stopped

  # Worker Services
  worker-1:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.worker
      args:
        WORKER_ID: "1"
    container_name: telephone_worker_1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:devpassword123@postgres:5432/telephone_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672//}
      WORKER_ID: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - telephone_network
    restart: unless-stopped

  worker-2:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.worker
      args:
        WORKER_ID: "2"
    container_name: telephone_worker_2
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:devpassword123@postgres:5432/telephone_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672//}
      WORKER_ID: "2"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - telephone_network
    restart: unless-stopped

  worker-3:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.worker
      args:
        WORKER_ID: "3"
    container_name: telephone_worker_3
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:devpassword123@postgres:5432/telephone_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672//}
      WORKER_ID: "3"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - telephone_network
    restart: unless-stopped

  # CLI Client
  cli:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.cli
    stdin_open: true
    tty: true
    depends_on:
      - api
    networks:
      - telephone_network

volumes:
  postgres_data:
  rabbitmq_data:
  ollama_models:

networks:
  telephone_network:
    driver: bridge
